<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXON INTERVIEW - Bazzi Care System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-gray: #f5f7fa;
            --char-shadow: rgba(255, 60, 60, 0.4);
            --emergency-color: #FF6B6B;
            --admin-dark: #1a1a1a;
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: var(--bg-gray);
            font-family: 'Pretendard', sans-serif; touch-action: manipulation; overflow: hidden;
        }

        .mobile-container {
            width: 360px; height: 640px; background: white;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }

        /* 설정 톱니바퀴 스타일 (관리자 화면 내부용) */
        .settings-btn {
            position: absolute; top: 25px; right: 20px; font-size: 18px; color: var(--primary-color);
            cursor: pointer; z-index: 10; transition: transform 0.3s;
        }

        .screen { width: 100%; height: 100%; padding: 40px 24px; box-sizing: border-box; display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        .header { margin-bottom: 35px; text-align: center; }
        .header h2 { color: #333; font-size: 24px; font-weight: 800; cursor: pointer; user-select: none; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        
        .submit-btn { margin-top: auto; width: 100%; padding: 18px; border: none; border-radius: 15px; background-color: var(--primary-color); color: white; font-size: 18px; font-weight: bold; cursor: pointer; }

        /* 관리자 화면 전용 */
        #admin-screen { background-color: var(--admin-dark); color: white; padding: 30px 20px; position: relative; }
        .admin-top h2 { font-size: 20px; font-weight: 800; color: var(--primary-color); margin-bottom: 20px; }
        .admin-menu { display: flex; gap: 10px; margin-bottom: 20px; }
        .menu-item { flex: 1; padding: 12px; background: #2d2d2d; border-radius: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid #444; }
        .menu-item.active { background: var(--primary-color); border-color: var(--primary-color); }
        
        .status-summary { background: #3d3d3d; padding: 12px; border-radius: 10px; margin-bottom: 15px; font-size: 13px; }
        .status-summary b { color: var(--primary-color); }

        .admin-content { flex: 1; overflow-y: auto; }
        .user-list { list-style: none; padding: 0; }
        .user-item { background: #2d2d2d; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3d3d3d; }
        .u-name { font-weight: bold; font-size: 14px; display: block; }
        .u-time { font-size: 11px; color: #888; }
        .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
        .status-complete { background: #27ae60; color: white; }
        .status-waiting { background: #444; color: #888; }

        .exit-btn { margin-top: 15px; padding: 15px; background: transparent; border: 1px solid #444; color: #777; border-radius: 12px; cursor: pointer; font-size: 13px; }

        /* 메인 화면 */
        #main-screen { background: radial-gradient(circle, #ffffff, #f0f4f8); align-items: center; text-align: center; position: relative; }
        .nexon-logo { position: absolute; top: 25px; left: 24px; font-size: 16px; font-weight: 900; color: #333; }
        .nexon-logo span { color: var(--primary-color); }
        .welcome-header { margin-top: 40px; }
        .bazzi-img { max-width: 70%; margin-top: 30px; filter: drop-shadow(0 15px 25px var(--char-shadow)); transition: 0.1s; cursor: pointer; }
        .squash-head { transform: scale(1.15, 0.8) translateY(15px); }
        .jump-feet { animation: jumpAnim 0.45s ease-out; }
        @keyframes jumpAnim { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }

        /* 모달 */
        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 9999; border-radius: 30px; }
        .modal-content { width: 280px; background: white; border-radius: 24px; padding: 30px 20px; text-align: center; position: relative; }
        .modal-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background-color: var(--primary-color); color: white; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div id="login-screen" class="screen">
            <div class="header">
                <h2 onclick="adminClickCounter()">NEXON INTERVIEW</h2>
                <p>정보를 입력해 주세요.</p>
            </div>
            <div class="input-group"><label>성함</label><input type="text" id="name" placeholder="성함 입력"></div>
            <div class="input-group"><label>휴대폰 번호</label><input type="tel" id="phone" placeholder="010-0000-0000"></div>
            <button class="submit-btn" onclick="validateAttendance()">출석 체크</button>
        </div>

        <div id="admin-screen" class="screen hidden">
            <div class="settings-btn" onclick="openSettings()">⚙️</div>
            
            <div class="admin-top"><h2>Admin Mode</h2></div>
            <div class="admin-menu">
                <div class="menu-item active" id="menu-upload" onclick="switchAdminTab('upload')">파일 업로드</div>
                <div class="menu-item" id="menu-status" onclick="switchAdminTab('status')">출석 현황</div>
            </div>
            <div id="tab-upload" class="admin-content">
                <div style="background:#2d2d2d; padding:20px; border-radius:15px; text-align:center;">
                    <p id="data-status" style="font-size:13px; color:#888">명단을 업로드하세요.</p>
                    <label for="excel-upload" style="display:block; background:#444; padding:15px; border-radius:12px; cursor:pointer; font-weight:bold; margin-top:15px;">파일 선택</label>
                    <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none">
                </div>
            </div>
            <div id="tab-status" class="admin-content hidden">
                <div class="status-summary" id="status-bar">
                    오늘 날짜: <span id="today-date">0000.00.00</span><br>
                    총 후보자: <b id="total-count">0</b>명
                </div>
                <ul class="user-list" id="admin-user-list"></ul>
            </div>
            <button class="exit-btn" onclick="exitAdmin()">로그아웃</button>
        </div>

        <div id="main-screen" class="screen hidden">
            <div class="nexon-logo">NEXON <span>Squishy</span></div>
            <div class="welcome-header"><h3 id="welcome-user">반갑습니다!</h3><p>배찌를 눌러 긴장을 풀어보세요.</p></div>
            <img src="character.png" id="bazzi" class="bazzi-img" onmousedown="handleTouch(event)" ontouchstart="handleTouch(event)">
        </div>

        <div class="modal-overlay" id="infoModal">
            <div class="modal-content">
                <h3 id="modal-title">알림</h3>
                <div id="modal-input-area" class="hidden" style="margin:15px 0;">
                    <input type="password" id="modal-input" style="text-align:center;">
                </div>
                <p id="modal-desc" style="font-size:14px; color:#666; line-height:1.6; white-space:pre-wrap;"></p>
                <button class="modal-btn" onclick="closeModal()">확인</button>
                <button class="exit-btn" id="cancel-btn" onclick="closeModal(true)" style="width:100%; border:none;">취소</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://yccemofujngavovwecdo.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljY2Vtb2Z1am5nYXZvdndlY2RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDI0NTEsImV4cCI6MjA5MTExODQ1MX0.LjRqpR4n6As6A9TR5-8_CTachNMGiW2HrgMUsVDirp0';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let adminPassword = "1234"; 
        let clickCount = 0;

        async function loadSettings() {
            const { data } = await _supabase.from('interview_list').select('*').eq('user_name', 'SYSTEM_CONFIG').single();
            if(data) adminPassword = data.phone_number;
        }
        loadSettings();

        function adminClickCounter() {
            if(++clickCount >= 5) {
                clickCount = 0;
                openAdminLogin();
            }
        }

        function openAdminLogin() {
            document.getElementById('modal-input-area').classList.remove('hidden');
            document.getElementById('modal-input').value = "";
            document.getElementById('cancel-btn').classList.remove('hidden');
            showPopup("Admin Access", "비밀번호를 입력하세요.", async () => {
                const input = document.getElementById('modal-input').value;
                if(input === adminPassword) {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('admin-screen').classList.remove('hidden');
                } else { alert("비밀번호가 틀렸습니다."); }
                document.getElementById('modal-input-area').classList.add('hidden');
            });
        }

        // 관리자 모드 안에서만 작동하는 설정 버튼
        function openSettings() {
            document.getElementById('modal-input-area').classList.remove('hidden');
            document.getElementById('modal-input').value = "";
            showPopup("비밀번호 변경", "새로운 관리자 비밀번호를 입력하세요.", async () => {
                const newPw = document.getElementById('modal-input').value;
                if(newPw.length < 1) return;
                await _supabase.from('interview_list').upsert({ user_name: 'SYSTEM_CONFIG', phone_number: newPw });
                adminPassword = newPw;
                alert("비밀번호가 변경되었습니다.");
                document.getElementById('modal-input-area').classList.add('hidden');
            });
        }

        function switchAdminTab(tab) {
            document.getElementById('menu-upload').classList.toggle('active', tab === 'upload');
            document.getElementById('menu-status').classList.toggle('active', tab === 'status');
            document.getElementById('tab-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('tab-status').classList.toggle('hidden', tab !== 'status');
            if(tab === 'status') renderAdminList();
        }

        async function renderAdminList() {
            const listEl = document.getElementById('admin-user-list');
            const { data } = await _supabase.from('interview_list').select('*').neq('user_name', 'SYSTEM_CONFIG');
            const now = new Date();
            document.getElementById('today-date').innerText = `${now.getFullYear()}.${now.getMonth()+1}.${now.getDate()}`;
            document.getElementById('total-count').innerText = data ? data.length : 0;

            if(!data || data.length === 0) { listEl.innerHTML = '<p style="text-align:center; color:#555; margin-top:20px;">명단이 없습니다.</p>'; return; }
            listEl.innerHTML = data.map(u => `
                <li class="user-item">
                    <div class="user-info"><span class="u-name">${u.user_name}</span><span class="u-time">${u.interview_time}</span></div>
                    <span class="status-tag ${u.checked_in ? 'status-complete' : 'status-waiting'}">${u.checked_in ? '완료' : '대기'}</span>
                </li>
            `).join('');
        }

        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const keys = Object.keys(rawData[0]);
                const formattedData = rawData.map(row => ({
                    user_name: String(row[keys.find(k => k.includes('성함') || k.includes('이름'))] || '').trim(),
                    phone_number: String(row[keys.find(k => k.includes('번호'))] || '').trim(),
                    job_title: String(row[keys.find(k => k.includes('공고'))] || '').trim(),
                    interview_time: String(row[keys.find(k => k.includes('시간'))] || '').trim(),
                    checked_in: false
                }));
                await _supabase.from('interview_list').delete().neq('user_name', 'SYSTEM_CONFIG');
                await _supabase.from('interview_list').insert(formattedData);
                document.getElementById('data-status').innerText = `${formattedData.length}명 동기화 완료!`;
            };
            reader.readAsArrayBuffer(file);
        });

        async function validateAttendance() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const { data } = await _supabase.from('interview_list').select('*').eq('user_name', name);
            const user = data?.find(u => u.phone_number.replace(/-/g,'') === phone.replace(/-/g,''));
            if(user) {
                showPopup("출석 확인", `성함: ${user.user_name}\n지원 공고: ${user.job_title}\n\n맞습니까?`, async () => {
                    await _supabase.from('interview_list').update({ checked_in: true }).eq('id', user.id);
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-screen').classList.remove('hidden');
                    document.getElementById('welcome-user').innerText = `${user.user_name}님, 반갑습니다!`;
                });
            } else { alert("정보가 일치하지 않습니다."); }
        }

        function showPopup(t, d, c) {
            window.currentCallback = c;
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-desc').innerText = d;
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeModal(isCancel = false) {
            document.getElementById('infoModal').style.display = 'none';
            if(!isCancel && window.currentCallback) window.currentCallback();
            window.currentCallback = null;
        }

        function exitAdmin() { location.reload(); }

        function handleTouch(event) {
            const bazzi = document.getElementById('bazzi');
            bazzi.classList.remove('squash-head', 'jump-feet');
            void bazzi.offsetWidth;
            const relY = ( (event.type === 'touchstart' ? event.touches[0].clientY : event.clientY) - bazzi.getBoundingClientRect().top) / bazzi.getBoundingClientRect().height;
            if (relY < 0.3) bazzi.classList.add('squash-head');
            else if (relY > 0.7) bazzi.classList.add('jump-feet');
        }
    </script>
</body>
</html>
