<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXON INTERVIEW - Bazzi Care System</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #4A90E2; --bg-gray: #f5f7fa; --char-shadow: rgba(255, 60, 60, 0.4); --emergency-color: #FF6B6B; --admin-dark: #1a1a1a; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-gray); font-family: 'Pretendard', sans-serif; touch-action: manipulation; overflow: hidden; }
        .mobile-container { width: 360px; height: 640px; background: white; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .screen { width: 100%; height: 100%; padding: 40px 24px; box-sizing: border-box; display: flex; flex-direction: column; transition: filter 0.3s ease; }
        .hidden { display: none !important; }
        .header { margin-bottom: 35px; text-align: center; }
        .header h2 { color: #333; font-size: 24px; font-weight: 800; margin-bottom: 8px; cursor: pointer; user-select: none; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; }
        input { width: 100%; padding: 15px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: white; }
        .submit-btn { margin-top: auto; width: 100%; padding: 18px; border: none; border-radius: 15px; background-color: var(--primary-color); color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        #admin-screen { background-color: var(--admin-dark); color: white; padding: 30px 20px; }
        .admin-menu { display: flex; gap: 15px; margin-bottom: 25px; }
        .menu-item { flex: 1; padding: 12px; background: #2d2d2d; border-radius: 12px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid #444; }
        .menu-item.active { background: var(--primary-color); border-color: var(--primary-color); }
        .user-item { background: #2d2d2d; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3d3d3d; }
        .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
        .status-waiting { background: #444; color: #888; }
        .status-complete { background: #27ae60; color: white; }
        #main-screen { background: radial-gradient(circle, #ffffff, #f0f4f8); align-items: center; text-align: center; position: relative; }
        .bazzi-img { width: 180px; height: auto; filter: drop-shadow(0 15px 25px var(--char-shadow)); cursor: pointer; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <div id="login-screen" class="screen">
            <div class="header">
                <h2 id="admin-trigger" onclick="adminClickCounter()">NEXON INTERVIEW</h2>
                <p>본인 확인을 위해 정보를 입력해 주세요.</p>
            </div>
            <div class="input-group"><label>성함</label><input type="text" id="name" placeholder="성함을 입력하세요"></div>
            <div class="input-group"><label>휴대폰 번호</label><input type="tel" id="phone" placeholder="010-0000-0000"></div>
            <button class="submit-btn" onclick="validateAttendance()">출석 체크</button>
        </div>

        <div id="admin-screen" class="screen hidden">
            <div class="admin-menu">
                <div class="menu-item active" id="menu-upload" onclick="switchAdminTab('upload')">파일 업로드</div>
                <div class="menu-item" id="menu-status" onclick="switchAdminTab('status')">출석 현황</div>
            </div>
            <div id="tab-upload">
                <label for="excel-upload" style="display:block; background:#444; padding:20px; border-radius:15px; text-align:center; cursor:pointer; font-weight:bold;">엑셀 파일 선택</label>
                <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none">
                <p id="data-status" style="text-align:center; color:#888; font-size:13px; margin-top:10px;">명단 파일을 업로드하세요.</p>
            </div>
            <div id="tab-status" class="hidden">
                <ul id="admin-user-list" style="list-style:none; padding:0; margin:0;"></ul>
            </div>
            <button onclick="location.reload()" style="margin-top:auto; padding:15px; background:transparent; border:1px solid #444; color:#777; border-radius:12px; cursor:pointer;">홈으로 돌아가기</button>
        </div>

        <div id="main-screen" class="screen hidden">
            <h3 id="welcome-user" style="font-size:20px; margin-top:40px;">님, 반갑습니다!</h3>
            <img src="https://i.ibb.co/v4m6pX6/bazzi.png" class="bazzi-img" id="bazzi" style="margin-top:40px;">
            <p style="margin-top:20px; color:#666;">배찌가 응원하고 있어요!</p>
        </div>
    </div>

    <script>
        // 2. Supabase 초기화 (이 부분이 핵심 수정 사항입니다)
        const S_URL = "https://yccemofujngavovwecdo.supabase.co";
        const S_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljY2Vtb2Z1am5nYXZvdndlY2RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDI0NTEsImV4cCI6MjA5MTExODQ1MX0.LjRqpR4n6As6A9TR5-8_CTachNMGiW2HrgMUsVDirp0";
        const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

        let clickCount = 0;

        // 관리자 모드 진입 (5번 클릭)
        function adminClickCounter() {
            clickCount++;
            if(clickCount >= 5) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-screen').classList.remove('hidden');
                clickCount = 0;
            }
        }

        // 출석 체크 실행
        async function validateAttendance() {
            const nameInput = document.getElementById('name').value.trim();
            const phoneInput = document.getElementById('phone').value.trim();
            
            if(!nameInput || !phoneInput) { alert("정보를 입력해주세요."); return; }

            try {
                const { data, error } = await supabaseClient
                    .from('interview_list')
                    .select('*')
                    .eq('name', nameInput);

                if (error) throw error;

                const user = data.find(u => u.phone === phoneInput || u.phone.replace(/-/g,'') === phoneInput.replace(/-/g,''));

                if(user) {
                    await supabaseClient.from('interview_list').update({ checked_in: true }).eq('id', user.id);
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('main-screen').classList.remove('hidden');
                    document.getElementById('welcome-user').innerText = `${nameInput}님, 반갑습니다!`;
                } else {
                    alert("일치하는 정보가 없습니다.");
                }
            } catch (e) {
                console.error(e);
                alert("데이터 조회 중 오류가 발생했습니다.");
            }
        }

        // 엑셀 업로드
        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async function(event) {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    
                    const insertData = rawData.map(row => {
                        const keys = Object.keys(row);
                        const nameK = keys.find(k => k.includes('성함') || k.includes('이름')) || keys[0];
                        const phoneK = keys.find(k => k.includes('번호') || k.includes('연락처')) || keys[1];
                        return {
                            name: String(row[nameK] || '').trim(),
                            phone: String(row[phoneK] || '').trim(),
                            job: String(row['지원 공고'] || ''),
                            time: String(row['시간'] || ''),
                            checked_in: false
                        };
                    });

                    await supabaseClient.from('interview_list').delete().neq('name', 'none');
                    await supabaseClient.from('interview_list').insert(insertData);
                    alert("명단 업로드 완료!");
                    location.reload();
                } catch (err) {
                    alert("파일 처리 중 오류 발생");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // 탭 전환 및 현황 렌더링
        function switchAdminTab(tab) {
            document.getElementById('menu-upload').classList.toggle('active', tab === 'upload');
            document.getElementById('tab-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('tab-status').classList.toggle('hidden', tab === 'upload');
            if(tab === 'status') renderAdminList();
        }

        async function renderAdminList() {
            const { data } = await supabaseClient.from('interview_list').select('*').order('name');
            const listEl = document.getElementById('admin-user-list');
            listEl.innerHTML = data.map(u => `
                <li class="user-item">
                    <div><span style="font-weight:bold;">${u.name}</span><br><small style="color:#888;">${u.time}</small></div>
                    <span class="status-tag ${u.checked_in ? 'status-complete' : 'status-waiting'}">${u.checked_in ? '완료' : '대기'}</span>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
