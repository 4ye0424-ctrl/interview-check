<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXON INTERVIEW - Bazzi Real-time</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary-color: #4A90E2; --bg-gray: #f5f7fa; --char-shadow: rgba(255, 60, 60, 0.4); --emergency-color: #FF6B6B; --admin-dark: #1a1a1a; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-gray); font-family: 'Pretendard', sans-serif; touch-action: manipulation; overflow: hidden; }
        .mobile-container { width: 360px; height: 640px; background: white; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .screen { width: 100%; height: 100%; padding: 40px 24px; box-sizing: border-box; display: flex; flex-direction: column; transition: filter 0.3s ease; }
        .hidden { display: none !important; }
        .header { margin-bottom: 35px; text-align: center; }
        .header h2 { color: #333; font-size: 24px; font-weight: 800; margin-bottom: 8px; cursor: pointer; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], input[type="tel"], input[type="password"] { width: 100%; padding: 15px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; }
        .submit-btn { margin-top: auto; width: 100%; padding: 18px; border: none; border-radius: 15px; background-color: var(--primary-color); color: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        #admin-screen { background-color: var(--admin-dark); color: white; padding: 30px 20px; }
        .admin-menu { display: flex; gap: 15px; margin-bottom: 25px; }
        .menu-item { flex: 1; padding: 12px; background: #2d2d2d; border-radius: 12px; text-align: center; cursor: pointer; font-size: 13px; border: 1px solid #444; }
        .menu-item.active { background: var(--primary-color); border-color: var(--primary-color); }
        .admin-content { flex: 1; overflow-y: auto; }
        .user-item { background: #2d2d2d; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3d3d3d; }
        .u-name { font-weight: bold; font-size: 14px; display: block; color: #fff; }
        .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: bold; }
        .status-waiting { background: #444; color: #888; }
        .status-complete { background: #27ae60; color: white; }
        #main-screen { background: radial-gradient(circle, #ffffff, #f0f4f8); align-items: center; text-align: center; position: relative; }
        .bazzi-img { width: 180px; height: auto; filter: drop-shadow(0 15px 25px var(--char-shadow)); transition: all 0.1s; transform-origin: center bottom; cursor: pointer; }
        .squash-head { transform: scale(1.15, 0.8) translateY(15px); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.6); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { width: 280px; background: white; border-radius: 24px; padding: 30px 20px; text-align: center; }
        .modal-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background-color: var(--primary-color); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div id="login-screen" class="screen">
            <div class="header"><h2 onclick="adminClickCounter()">NEXON INTERVIEW</h2><p>본인 확인을 위해 정보를 입력해 주세요.</p></div>
            <div class="input-group"><label>성함</label><input type="text" id="name" placeholder="성함"></div>
            <div class="input-group"><label>휴대폰 번호</label><input type="tel" id="phone" placeholder="010-0000-0000"></div>
            <button class="submit-btn" onclick="validateAttendance()">출석 체크</button>
        </div>
        <div id="admin-screen" class="screen hidden">
            <div class="admin-menu">
                <div class="menu-item active" onclick="switchAdminTab('upload')">업로드</div>
                <div class="menu-item" onclick="switchAdminTab('status')">현황</div>
            </div>
            <div id="tab-upload" class="admin-content">
                <label for="excel-upload" style="display:block; background:#444; padding:20px; border-radius:15px; text-align:center; cursor:pointer;">엑셀 파일 업로드</label>
                <input type="file" id="excel-upload" accept=".xlsx, .xls" style="display:none">
                <p id="data-status" style="text-align:center; color:#888; margin-top:10px;">파일을 선택하세요.</p>
            </div>
            <div id="tab-status" class="admin-content hidden"><ul id="admin-user-list" style="list-style:none; padding:0;"></ul></div>
            <button onclick="location.reload()" style="background:none; border:1px solid #444; color:#666; padding:10px; border-radius:10px; margin-top:10px;">새로고침</button>
        </div>
        <div id="main-screen" class="screen hidden">
            <h3 id="welcome-user">님, 반갑습니다!</h3>
            <div style="margin: 50px 0;">
                <img src="https://i.ibb.co/v4m6pX6/bazzi.png" class="bazzi-img" id="bazzi" onmousedown="this.classList.add('squash-head')" onmouseup="this.classList.remove('squash-head')">
            </div>
            <p>배찌를 눌러 긴장을 풀어보세요.</p>
        </div>
    </div>
    <div class="modal-overlay" id="infoModal"><div class="modal-content"><h3 id="modal-title"></h3><p id="modal-desc"></p><button class="modal-btn" onclick="closeModal()">확정</button></div></div>

    <script>
        const supabase = supabase.createClient('https://yccemofujngavovwecdo.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljY2Vtb2Z1am5nYXZvdndlY2RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NDI0NTEsImV4cCI6MjA5MTExODQ1MX0.LjRqpR4n6As6A9TR5-8_CTachNMGiW2HrgMUsVDirp0');
        let clickCount = 0;

        async function validateAttendance() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const { data, error } = await supabase.from('interview_list').select('*').eq('name', name).eq('phone', phone).single();
            if(data) {
                await supabase.from('interview_list').update({ checked_in: true }).eq('id', data.id);
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-screen').classList.remove('hidden');
                document.getElementById('welcome-user').innerText = `${name}님, 반갑습니다!`;
            } else { alert("정보가 일치하지 않습니다."); }
        }

        document.getElementById('excel-upload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = async function(event) {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                const rawData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const insertData = rawData.map(r => ({ name: String(r['성함']), phone: String(r['수신자 번호']), job: String(r['지원 공고']), time: String(r['시간']) }));
                await supabase.from('interview_list').delete().neq('id', '00000000-0000-0000-0000-000000000000');
                await supabase.from('interview_list').insert(insertData);
                alert("명단이 실시간 서버에 업로드되었습니다!");
                location.reload();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        async function renderAdminList() {
            const { data } = await supabase.from('interview_list').select('*').order('name');
            document.getElementById('admin-user-list').innerHTML = data.map(u => `<li class="user-item"><div><span class="u-name">${u.name}</span></div><span class="status-tag ${u.checked_in ? 'status-complete' : 'status-waiting'}">${u.checked_in ? '출석 완료' : '대기 중'}</span></li>`).join('');
        }

        function adminClickCounter() { if(++clickCount >= 5) { document.getElementById('login-screen').classList.add('hidden'); document.getElementById('admin-screen').classList.remove('hidden'); } }
        function switchAdminTab(tab) {
            document.getElementById('tab-upload').classList.toggle('hidden', tab !== 'upload');
            document.getElementById('tab-status').classList.toggle('hidden', tab !== 'status');
            if(tab === 'status') renderAdminList();
        }
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
    </script>
</body>
</html>
